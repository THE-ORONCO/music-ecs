name: CI/CD

on:
  push:
    branches: [main, release]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: 4.6.3

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true
      - name: Cache .godot/
        uses: actions/cache@v4
        id: godot-cache
        with:
          path: .godot/
          key: godot-import-${{ hashFiles('project.godot', 'export_presets.cfg') }}-${{ runner.os }}
      - name: Import project
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: godot --headless --import --path .
      - name: Run unit tests
        run: |
          godot --headless --path . -s \
            res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            -a res://test/unit/ --ignoreHeadlessMode
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: reports/

  integration-tests:
    name: Integration tests
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true
      - uses: actions/cache@v4
        id: godot-cache
        with:
          path: .godot/
          key: godot-import-${{ hashFiles('project.godot', 'export_presets.cfg') }}-${{ runner.os }}
      - name: Import project
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: godot --headless --import --path .
      - name: Run integration tests
        run: |
          godot --headless --path . -s \
            res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            -a res://test/integration/ --ignoreHeadlessMode
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: reports/

  build-windows:
    name: Windows (${{ matrix.mode }})
    needs: [integration-tests]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    steps:
      - uses: actions/checkout@v4
      - name: Export game
        id: export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          relative_project_path: ./
          presets_to_export: Windows
          export_debug: ${{ matrix.mode == 'debug' }}
          relative_export_path: build/windows
          cache: true
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.mode }}
          path: build/windows/

  build-macos:
    name: macOS (${{ matrix.mode }})
    needs: [integration-tests]
    if: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    steps:
      - run: echo "macOS build disabled"

  build-linux:
    name: Linux (${{ matrix.mode }})
    needs: [integration-tests]
    if: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    steps:
      - run: echo "Linux build disabled"

  build-web:
    name: Web (${{ matrix.mode }})
    needs: [integration-tests]
    if: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    steps:
      - run: echo "Web build disabled"

  deploy-itchio:
    name: Deploy to itch.io
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: build/windows
      - name: Install butler
        run: |
          wget -q https://broth.itch.ovh/butler/linux-amd64/LATEST.zip -O /tmp/butler.zip
          unzip -q /tmp/butler.zip -d /tmp/butler
      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
        run: |
          /tmp/butler/butler push build/windows \
            the-oronco/journey-through-the-feywild:windows \
            --userversion "${GITHUB_REF_NAME#v}"
