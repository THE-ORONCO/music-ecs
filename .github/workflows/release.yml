name: ♨️ Release
on: 
  push:
    branches:
      - main

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: music-ecs

jobs:
  export:
    name: export for all platforms
    runs-on: ubuntu-24.04
#    strategy:
#      # Don't cancel other OS runners if one fails.
#      fail-fast: false
#      matrix:
#        # Put the operating systems you want to run on here.
#        target: [ "Windows Desktop", "Linux/X11", "Web", "macOS" ]
#        include:
#          - expath: windows
#            target: "Windows Desktop"
#          - expath: linux
#            target: "Linux/X11"
#          - expath: web
#            target: "Web"
#          - expath: mac
#            target: "macOS"
    defaults:
      run:
        # Use bash shells on all platforms.
        shell: bash
    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          # Disable fetching history as most of the time it is useless
          filter: tree:0
          fetch-depth: 0
#          lfs: true

      - uses: chickensoft-games/setup-godot@v2
        name: 🤖 Setup Godot
        with:
          # Version must include major, minor, and patch, and be >= 4.0.0
          # Pre-release label is optional.
          version: 4.6.3 # also valid: 4.0.0.rc1 or 4.0.0 or "global.json", etc
          # Use .NET-enabled version of Godot (the default is also true).
          use-dotnet: false
          cache: true
          # Include the Godot Export Templates (the default is false).
          include-templates: true

      - name: 🤯 hacky workaround for bad imports of the main scene
        run: |
          godot --headless --import --verbose
        continue-on-error: true
      
      - name: 📦 export release version
        id: export_release
        # Use latest version (see releases for all versions)
        uses: firebelley/godot-export@v8.0.0
        with:
          # Defining all the required inputs
          godot_executable_download_url: https://godot-releases.nbg1.your-objectstorage.com/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://godot-releases.nbg1.your-objectstorage.com/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          verbose: true
          cache: true
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ steps.export_release.outputs.archive_directory }}

      - name: 🐛 export debug version
        id: export_debug
        # Use latest version (see releases for all versions)
        uses: firebelley/godot-export@v8.0.0
        with:
          # Defining all the required inputs
          godot_executable_download_url: https://godot-releases.nbg1.your-objectstorage.com/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://godot-releases.nbg1.your-objectstorage.com/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          verbose: true
          cache: true
          export_debug: true
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug
          path: ${{ steps.export_debug.outputs.archive_directory }}
          
